version: "0.0.1"

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: taxuser
      POSTGRES_PASSWORD: taxpassword
      POSTGRES_DB: taxdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://taxuser:taxpassword@postgres:5432/taxdb
    ports:
      - "8000:8000"

volumes:
  pgdata: